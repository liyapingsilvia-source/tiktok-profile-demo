<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>暮光 — 让晚年不孤单</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --primary: #C7785C;
    --primary-light: #E8A88E;
    --primary-dark: #A05A3E;
    --accent: #6B8E6B;
    --accent-light: #8FB88F;
    --gold: #C9A96E;
    --gold-light: #F0DDB4;
    --bg: #FAF6F1;
    --bg-card: #FFFFFF;
    --text: #3D2E1E;
    --text-secondary: #8C7B6B;
    --text-muted: #B5A99A;
    --border: #EDE6DD;
    --shadow: rgba(61, 46, 30, 0.08);
    --radius: 16px;
    --radius-sm: 10px;
    --safe-top: 54px;
    --safe-bottom: 34px;
    --tab-height: 64px;
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: #E8E0D8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: var(--text);
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    border-radius: 44px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
  }

  /* Status Bar */
  .status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: var(--safe-top);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .status-bar .time { font-variant-numeric: tabular-nums; }
  .status-bar .icons { display: flex; gap: 5px; align-items: center; }
  .status-bar .icons svg { width: 16px; height: 16px; }

  /* Screens */
  .screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .screen.active { display: flex; }
  .screen-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-top: var(--safe-top);
  }
  .screen-body::-webkit-scrollbar { display: none; }
  .screen-body.with-tabs { padding-bottom: calc(var(--tab-height) + var(--safe-bottom)); }

  /* ============== SPLASH ============== */
  #splash {
    background: linear-gradient(145deg, #C7785C 0%, #A05A3E 40%, #6B4E3A 100%);
    justify-content: center;
    align-items: center;
    z-index: 200;
  }
  #splash .logo-wrap {
    text-align: center;
    animation: fadeInUp 1s ease;
  }
  #splash .logo-icon {
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.15);
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 52px;
  }
  #splash .app-name {
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }
  #splash .app-slogan {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    font-weight: 300;
    letter-spacing: 2px;
  }

  /* ============== ONBOARDING ============== */
  #onboarding { background: var(--bg); }
  .onboard-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    padding: 40px 32px;
    text-align: center;
  }
  .onboard-illustration {
    width: 220px; height: 220px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 96px;
    margin-bottom: 40px;
    box-shadow: 0 12px 40px rgba(199, 120, 92, 0.2);
  }
  .onboard-content h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 16px;
    line-height: 1.3;
    color: var(--text);
  }
  .onboard-content p {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 48px;
  }

  /* Buttons */
  .btn-primary {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    background: var(--primary);
    color: #fff;
    letter-spacing: 1px;
  }
  .btn-primary:active { transform: scale(0.97); filter: brightness(0.95); }
  .btn-secondary {
    width: 100%;
    padding: 16px;
    border: 2px solid var(--border);
    border-radius: 14px;
    font-size: 17px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    margin-top: 12px;
    transition: all 0.2s;
  }
  .btn-secondary:active { background: var(--border); }
  .btn-small {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-small:active { transform: scale(0.96); }

  /* ============== REGISTER ============== */
  #register { background: var(--bg); }
  .register-body {
    padding: 20px 24px;
  }
  .register-body .page-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    margin-top: 12px;
  }
  .register-body .page-desc {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    line-height: 1.5;
  }
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    font-family: inherit;
    background: var(--bg-card);
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus { border-color: var(--primary); }
  .form-input::placeholder { color: var(--text-muted); }
  .phone-input-wrap {
    display: flex;
    gap: 10px;
  }
  .phone-input-wrap .prefix {
    width: 72px;
    padding: 14px 12px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    background: var(--bg-card);
    text-align: center;
    color: var(--text);
    font-weight: 500;
  }
  .phone-input-wrap .form-input { flex: 1; }
  .code-input-wrap {
    display: flex;
    gap: 10px;
  }
  .code-input-wrap .form-input { flex: 1; }
  .send-code-btn {
    padding: 14px 16px;
    border: none;
    border-radius: 12px;
    background: var(--primary-light);
    color: var(--primary-dark);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
  }

  .step-indicator {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    margin-top: 12px;
  }
  .step-dot {
    height: 4px;
    border-radius: 2px;
    flex: 1;
    background: var(--border);
    transition: background 0.3s;
  }
  .step-dot.done { background: var(--primary); }
  .step-dot.current { background: var(--primary); flex: 2; }

  /* Gender select */
  .gender-options {
    display: flex;
    gap: 16px;
  }
  .gender-card {
    flex: 1;
    padding: 28px 16px;
    border: 2px solid var(--border);
    border-radius: 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg-card);
  }
  .gender-card:active { transform: scale(0.97); }
  .gender-card.selected {
    border-color: var(--primary);
    background: rgba(199, 120, 92, 0.06);
  }
  .gender-card .icon { font-size: 48px; margin-bottom: 12px; }
  .gender-card .label { font-size: 16px; font-weight: 600; }

  /* Interest tags */
  .interest-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .interest-tag {
    padding: 10px 18px;
    border: 2px solid var(--border);
    border-radius: 20px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg-card);
    user-select: none;
  }
  .interest-tag:active { transform: scale(0.96); }
  .interest-tag.selected {
    border-color: var(--accent);
    background: rgba(107, 142, 107, 0.1);
    color: var(--accent);
    font-weight: 600;
  }

  /* ============== MAIN TABS ============== */
  .tab-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: calc(var(--tab-height) + var(--safe-bottom));
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 50;
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    color: var(--text-muted);
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-item.active { color: var(--primary); }
  .tab-item svg { width: 24px; height: 24px; }
  .tab-item span { font-size: 11px; font-weight: 500; }

  /* Tab contents */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ============== DISCOVER TAB ============== */
  .discover-header {
    padding: 16px 24px 0;
  }
  .discover-header h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .discover-header .greeting {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .daily-picks-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 24px;
    margin-bottom: 16px;
  }
  .daily-picks-label .icon { font-size: 20px; }
  .daily-picks-label span {
    font-size: 16px;
    font-weight: 600;
  }
  .daily-picks-label .count {
    font-size: 13px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* Profile cards */
  .profile-card {
    margin: 0 20px 16px;
    background: var(--bg-card);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
    cursor: pointer;
    transition: transform 0.2s;
  }
  .profile-card:active { transform: scale(0.98); }
  .profile-card-photo {
    width: 100%;
    height: 260px;
    background: linear-gradient(135deg, #D4B896, #A8C4A0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    position: relative;
  }
  .profile-card-photo .match-score {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
  }
  .profile-card-photo .verified {
    position: absolute;
    bottom: 16px; left: 16px;
    display: flex;
    gap: 6px;
  }
  .verified-badge {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--accent);
  }
  .profile-card-info {
    padding: 16px 20px 20px;
  }
  .profile-card-info .name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .profile-card-info .name {
    font-size: 20px;
    font-weight: 700;
  }
  .profile-card-info .age-tag {
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    background: rgba(199, 120, 92, 0.1);
    color: var(--primary);
  }
  .profile-card-info .location {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .profile-card-info .bio {
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .profile-card-info .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .profile-card-info .tags span {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    background: var(--bg);
    color: var(--text-secondary);
  }
  .profile-card-actions {
    display: flex;
    gap: 12px;
    padding: 0 20px 20px;
  }
  .action-btn-pass {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    background: var(--bg-card);
    cursor: pointer;
    flex-shrink: 0;
  }
  .action-btn-like {
    flex: 1;
    height: 56px;
    border-radius: 28px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: inherit;
    letter-spacing: 1px;
  }
  .action-btn-like:active { filter: brightness(0.92); }

  /* ============== PROFILE DETAIL ============== */
  #profileDetail { background: var(--bg); z-index: 60; }
  .detail-hero {
    height: 380px;
    background: linear-gradient(135deg, #D4B896, #A8C4A0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 120px;
    position: relative;
  }
  .detail-back {
    position: absolute;
    top: calc(var(--safe-top) + 8px);
    left: 16px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    border: none;
  }
  .detail-body { padding: 24px; }
  .detail-body .name-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .detail-body .name { font-size: 26px; font-weight: 700; }
  .detail-body .detail-location {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .detail-section {
    margin-bottom: 24px;
  }
  .detail-section h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .detail-section .story {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
  }
  .detail-section .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .info-item {
    background: var(--bg-card);
    padding: 14px 16px;
    border-radius: 12px;
  }
  .info-item .label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
  .info-item .value { font-size: 15px; font-weight: 600; }
  .detail-action-bar {
    position: sticky;
    bottom: 0;
    padding: 16px 24px calc(16px + var(--safe-bottom));
    background: linear-gradient(transparent, var(--bg) 30%);
    display: flex;
    gap: 12px;
  }

  /* ============== CIRCLES TAB ============== */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px 12px;
  }
  .section-header h2 { font-size: 18px; font-weight: 700; }
  .section-header .more {
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
  }
  .circle-cards {
    display: flex;
    gap: 12px;
    padding: 0 24px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .circle-cards::-webkit-scrollbar { display: none; }
  .circle-card {
    min-width: 150px;
    scroll-snap-align: start;
    background: var(--bg-card);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow);
    flex-shrink: 0;
    cursor: pointer;
  }
  .circle-card:active { transform: scale(0.97); }
  .circle-card-icon {
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
  }
  .circle-card-info {
    padding: 0 14px 14px;
    text-align: center;
  }
  .circle-card-info .title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .circle-card-info .members {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Post items */
  .post-item {
    margin: 0 20px 14px;
    background: var(--bg-card);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 1px 6px var(--shadow);
  }
  .post-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .post-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .post-user-info .username { font-size: 15px; font-weight: 600; }
  .post-user-info .time { font-size: 12px; color: var(--text-muted); }
  .post-text {
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .post-image {
    width: 100%;
    height: 180px;
    border-radius: 12px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }
  .post-actions {
    display: flex;
    gap: 24px;
  }
  .post-action {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
  }

  /* ============== ACTIVITY TAB ============== */
  .activity-card {
    margin: 0 20px 14px;
    background: var(--bg-card);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 10px var(--shadow);
    cursor: pointer;
  }
  .activity-card:active { transform: scale(0.98); }
  .activity-banner {
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    position: relative;
  }
  .activity-banner .date-badge {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    padding: 6px 12px;
    text-align: center;
    line-height: 1.2;
  }
  .date-badge .day { font-size: 18px; font-weight: 700; color: var(--primary); display: block; }
  .date-badge .month { font-size: 11px; color: var(--text-secondary); }
  .activity-info { padding: 14px 16px; }
  .activity-info .title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .activity-info .meta {
    display: flex;
    gap: 12px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .activity-info .seats {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .activity-info .seats .avatars {
    display: flex;
  }
  .activity-info .seats .avatars span {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    margin-right: -8px;
    border: 2px solid #fff;
  }
  .activity-info .seats .count {
    font-size: 13px;
    color: var(--text-muted);
  }
  .activity-join-btn {
    padding: 8px 20px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  /* ============== CHAT TAB ============== */
  .chat-list { padding: 12px 0; }
  .chat-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 24px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .chat-item:active { background: rgba(0,0,0,0.03); }
  .chat-avatar {
    width: 54px; height: 54px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
    position: relative;
  }
  .chat-avatar .online-dot {
    position: absolute;
    bottom: 2px; right: 2px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #4CAF50;
    border: 2px solid var(--bg);
  }

function selectGender(g) {
  selectedGender = g;
  renderRegisterStep();
}

function toggleInterest(el, name) {
  if (selectedInterests.has(name)) { selectedInterests.delete(name); }
  else { selectedInterests.add(name); }
  el.classList.toggle('selected');
}

function nextRegStep() {
  registerStep++;
  renderRegisterStep();
}

function finishRegister() {
  if (selectedInterests.size < 3) {
    showToast('请至少选择3个兴趣');
    return;
  }
  showToast('🎉 注册成功！');
  setTimeout(() => goTo('mainApp'), 800);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

}

function renderTab(tab) {
  const c = document.getElementById('mainContent');

}

function showAiCoachHint(msgs, userText) {
  const coachHints = {
    keywords: {
      '你好': '试试进一步问问对方今天过得怎么样，或者分享您自己今天做了什么 😊',
      '在吗': '比起"在吗"，直接说点有趣的事儿更容易收到回复哦！比如："刚在公园看到一只特别漂亮的鸟🐦"',
      '认识': '很好的开场！可以再补充一下您对 TA 哪方面最感兴趣，让对方感到被关注 💛',
      '聊天': '聊天的秘诀是分享——分享见闻、分享感受、分享好吃的和好玩的 ✨',
    },
    default: ['好的呢 😊', '说得对！', '那我们什么时候见面？', '哈哈，有意思', '嗯嗯，我也这么觉得', '太好了！改天约起 👋']
  };

  let hasCoachHint = false;
  for (const [kw, hint] of Object.entries(coachHints.keywords)) {
    if (userText.includes(kw)) {
      hasCoachHint = true;
      setTimeout(() => {
        const coachBubble = document.createElement('div');
        coachBubble.className = 'fade-in';
        coachBubble.style.cssText = 'align-self:center;max-width:85%;padding:10px 14px;border-radius:12px;background:rgba(107,90,142,0.08);border:1px solid rgba(107,90,142,0.15);margin:4px 0;';
        coachBubble.innerHTML = '<div style="font-size:11px;font-weight:700;color:#6B5A8E;margin-bottom:4px">💡 暮小光 · 聊天小助手</div><div style="font-size:13px;color:#6B5A8E;line-height:1.5">' + hint + '</div>';
        msgs.appendChild(coachBubble);
        msgs.scrollTop = msgs.scrollHeight;
      }, 800);
      break;
    }
  }

  setTimeout(() => {
    const reply = document.createElement('div');
    reply.className = 'msg-bubble msg-received fade-in';
    reply.textContent = coachHints.default[Math.floor(Math.random() * coachHints.default.length)];
    msgs.appendChild(reply);
    msgs.scrollTop = msgs.scrollHeight;
  }, hasCoachHint ? 2000 : 1200);
}

function startAiScene(sceneName) {
  document.getElementById('aiSceneArea').innerHTML = '';
  const sceneMap = {
    '随便聊聊': 'greeting', '情感倾诉': 'lonely', '健康问答': 'health',
    '讲个故事': 'story', '怀旧金曲': 'music', '聊天教练': 'coach'
  };
  currentAiScene = sceneMap[sceneName] || 'default';

  const userMsg = sceneName;
  appendAiUserMsg(userMsg);

  showAiTyping(() => {
    const pool = AI_RESPONSES[currentAiScene] || AI_RESPONSES.default;
    const reply = pool[Math.floor(Math.random() * pool.length)];
    appendAiReply(reply);
    renderAiSuggestions(currentAiScene);
  });
}

function sendAiMessage(text) {
  const input = document.getElementById('aiChatInput');
  const msg = text || input.value.trim();
  if (!msg) return;
  input.value = '';

  document.getElementById('aiSceneArea').innerHTML = '';
  appendAiUserMsg(msg);

  const scene = detectAiScene(msg);
  currentAiScene = scene;

  showAiTyping(() => {
    const pool = AI_RESPONSES[scene] || AI_RESPONSES.default;
    const reply = pool[Math.floor(Math.random() * pool.length)];
    appendAiReply(reply);
    renderAiSuggestions(scene);
  });
}

function detectAiScene(text) {
  const t = text.toLowerCase();
  if (/孤单|孤独|寂寞|无聊|没人|一个人|想.*陪|难过|心情不好/.test(t)) return 'lonely';
  if (/养生|健康|血压|睡眠|失眠|锻炼|膝盖|腰|头疼|吃什么好/.test(t)) return 'health';
  if (/故事|讲.*听|以前|从前|过去/.test(t)) return 'story';
  if (/歌|音乐|唱|曲|旋律|怀旧/.test(t)) return 'music';
  if (/怎么聊|开场白|不知道说什么|紧张|破冰|搭讪|话术/.test(t)) return 'coach';
  if (/你好|早上好|晚上好|嗨|在吗/.test(t)) return 'greeting';
  return 'default';
}

function appendAiUserMsg(text) {
  const msgs = document.getElementById('aiChatMessages');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble msg-sent fade-in';
  bubble.textContent = text;
  msgs.appendChild(bubble);
  msgs.scrollTop = msgs.scrollHeight;
  aiChatHistory.push({ role: 'user', text });
}

function appendAiReply(text) {
  const msgs = document.getElementById('aiChatMessages');
  const bubble = document.createElement('div');
  bubble.className = 'ai-msg-bubble fade-in';
  bubble.innerHTML = '<div class="ai-label">🤖 AI</div><div>' + text.replace(/\n/g, '<br>') + '</div>';
  msgs.appendChild(bubble);
  msgs.scrollTop = msgs.scrollHeight;
  aiChatHistory.push({ role: 'ai', text });
}

function showAiTyping(callback) {
  const msgs = document.getElementById('aiChatMessages');
  const typing = document.createElement('div');
  typing.className = 'ai-typing-indicator fade-in';
  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(typing);
  msgs.scrollTop = msgs.scrollHeight;

  const delay = 1000 + Math.random() * 1500;
  setTimeout(() => {
    typing.remove();
    callback();
  }, delay);
}

function renderAiSuggestions(scene) {
  const area = document.getElementById('aiSuggestionArea');
  const suggestions = AI_SUGGESTIONS_MAP[scene] || AI_SUGGESTIONS_MAP.default;
  area.innerHTML = `
    <div class="chat-suggestions">
      ${suggestions.map(s => `<button class="chat-suggestion-chip" onclick="sendAiMessage('${s}')">${s}</button>`).join('')}
    </div>
  `;
}

}
